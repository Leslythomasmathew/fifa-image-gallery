<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIFA World Cup 2026 - Image Gallery</title>
    <!-- Google Fonts for premium feel -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="gallery-wrapper">
        <header>
            <span class="badge">FIFA 2026 Showcase</span>
            <h1>World Cup Gallery</h1>
            <p class="subtitle">Experience the magic of the upcoming tournament across USA, Canada, and Mexico</p>
        </header>

        <main class="gallery-container">
            <div class="full-img">
                <img class="displayed-img" src="images/FIFA WORLD CUP 2026.jpg" alt="FIFA World Cup 2026 Poster">
                <div class="overlay"></div>
                <button class="dark">Darken View</button>
            </div>

            <div class="thumb-bar-container">
                <div class="thumb-bar"></div>
            </div>
        </main>
        
        <footer>
            <p>&copy; 2026 FIFA World Cup Fan Gallery. All images property of their respective creators.</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
